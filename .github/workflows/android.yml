name: Android APK Build

# 推送到 main 分支自动构建；也可在 Actions 页面手动触发
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 安装 Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 安装 Rust 工具链 + Android 交叉编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk

      - name: 安装 Android NDK (匹配 build.gradle 中固定的版本)
        run: |
          SDK_ROOT="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          NDK_VERSION="28.2.13676358"
          echo "安装 NDK ${NDK_VERSION} ..."
          yes | "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VERSION}" > /dev/null 2>&1 || true
          NDK_HOME="${SDK_ROOT}/ndk/${NDK_VERSION}"
          if [ ! -d "${NDK_HOME}" ]; then
            echo "未找到精确版本，使用 runner 已安装的 NDK："
            NDK_HOME=$(ls -d "${SDK_ROOT}"/ndk/* 2>/dev/null | head -n1)
          fi
          echo "ANDROID_NDK_HOME=${NDK_HOME}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${NDK_HOME}" >> "$GITHUB_ENV"
          echo "使用 NDK: ${NDK_HOME}"

      - name: 下载并安装 Gradle 8.13（用于生成 gradlew）
        run: |
          cd /tmp
          curl -fsSL -o gradle-8.13-bin.zip https://services.gradle.org/distributions/gradle-8.13-bin.zip
          unzip -q gradle-8.13-bin.zip
          echo "/tmp/gradle-8.13/bin" >> "$GITHUB_PATH"

      - name: 创建 android/local.properties（settings.gradle 需要 flutter.sdk）
        run: |
          FLUTTER_BIN="$(which flutter)"
          FLUTTER_SDK="$(dirname "$(dirname "$FLUTTER_BIN")")"
          echo "flutter.sdk=${FLUTTER_SDK}" > android/local.properties
          echo "Flutter SDK: ${FLUTTER_SDK}"

      - name: 生成 gradlew 脚本（仓库已 gitignore，CI 重建）
        run: |
          cd android
          gradle wrapper --gradle-version 8.13 --distribution-type bin
          chmod +x gradlew

      - name: 生成临时签名 keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -storepass intiface -keypass intiface \
            -alias intiface -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Intiface Central, OU=Dev, O=Nonpolynomial, L=NA, ST=NA, C=US"
          printf 'storePassword=intiface\nkeyPassword=intiface\nkeyAlias=intiface\nstoreFile=release.keystore\n' > android/key.properties

      - name: 拉取 Dart 依赖
        run: flutter pub get

      - name: 临时关闭 minify/shrink 以便诊断闪退原因
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/' android/app/build.gradle
          echo "=== build.gradle release 块 ==="
          grep -A 10 'buildTypes {' android/app/build.gradle

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 构建 Debug APK（debug 模式显示红屏错误而非直接闪退）
        run: flutter build apk --debug

      - name: 分析 APK 内容（诊断闪退原因）
        run: |
          {
            echo "# APK 诊断报告"
            echo ""
            echo "## Release APK"
            apk_rel=$(ls build/app/outputs/flutter-apk/app-release.apk)
            echo "路径: $apk_rel"
            echo "大小: $(ls -lh "$apk_rel" | awk '{print $5}')"
            echo ""
            echo "### lib/ 目录 .so 文件"
            unzip -l "$apk_rel" | grep -E 'lib/[^/]+/[^/]+\.so' || echo '❌ 没有找到 .so 文件'
            echo ""
            echo "### classes.dex"
            unzip -l "$apk_rel" | grep -E 'classes\.dex' | head -5
            echo ""
            echo "## Debug APK"
            apk_dbg=$(ls build/app/outputs/flutter-apk/app-debug.apk)
            echo "路径: $apk_dbg"
            echo "大小: $(ls -lh "$apk_dbg" | awk '{print $5}')"
            echo ""
            echo "### lib/ 目录 .so 文件"
            unzip -l "$apk_dbg" | grep -E 'lib/[^/]+/[^/]+\.so' || echo '❌ 没有找到 .so 文件'
            echo ""
            echo "## Rust 原生库构建输出"
            echo "### app/src/main/jniLibs (cargo ndk 输出)"
            find android/app/src/main/jniLibs -type f 2>/dev/null | sort || echo '目录不存在'
            echo ""
            echo "### rust_builder/build/jniLibs (Cargokit 输出)"
            find rust_builder/build/jniLibs -type f 2>/dev/null | sort || echo '目录不存在'
            echo ""
            echo "## 关键检查: librust_lib_intiface_central.so"
            echo "### Release APK"
            unzip -l "$apk_rel" | grep 'rust_lib_intiface_central' || echo '❌ Release APK 中缺少 librust_lib_intiface_central.so'
            echo "### Debug APK"
            unzip -l "$apk_dbg" | grep 'rust_lib_intiface_central' || echo '❌ Debug APK 中缺少 librust_lib_intiface_central.so'
          } > apk_diagnostic_report.md 2>&1
          cat apk_diagnostic_report.md

      - name: 上传诊断报告
        uses: actions/upload-artifact@v4
        with:
          name: apk-diagnostic-report
          path: apk_diagnostic_report.md
          retention-days: 30

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: intiface-central-android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: intiface-central-android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: 发布诊断报告为 GitHub Issue（便于远程查看）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 追加构建环境信息
          {
            echo ""
            echo "## 构建环境信息"
            echo "- NDK 路径: ${ANDROID_NDK_HOME:-未设置}"
            echo "- NDK ROOT: ${ANDROID_NDK_ROOT:-未设置}"
            echo "- Rust 版本: $(rustc --version 2>/dev/null || echo '未知')"
            echo "- cargo-ndk 版本: $(cargo ndk --version 2>/dev/null || echo '未知')"
            echo "- Flutter 版本: $(flutter --version 2>/dev/null | head -1 || echo '未知')"
            echo ""
            echo "## Rust target 目录中的 .so 文件"
            find rust/target -name '*.so' -type f 2>/dev/null | sort || echo '未找到'
            echo ""
            echo "## 完整 jniLibs 目录树"
            find android/app/src/main/jniLibs -type f 2>/dev/null | sort || echo 'jniLibs 目录不存在'
            echo ""
            echo "## rust_builder 完整 build 目录树"
            find rust_builder/build -name '*.so' -type f 2>/dev/null | sort || echo '未找到 .so'
          } >> apk_diagnostic_report.md

          # 创建 Issue
          gh issue create \
            --title "APK 诊断报告 - Build #${{ github.run_number }}" \
            --body-file apk_diagnostic_report.md \
            --label "diagnostic" 2>/dev/null || \
          gh issue create \
            --title "APK 诊断报告 - Build #${{ github.run_number }}" \
            --body-file apk_diagnostic_report.md
